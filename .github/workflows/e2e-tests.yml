name: E2E on Chrome

on:
  push:
    paths:
      - 'src/utils/forms.js'
      - 'src/constants/forms.js'
      - 'cypress/**'
      - 'src/components/shared/changelog-form/**'
      - 'src/components/pages/contact-sales/hero/contact-form/**'
      - 'src/components/pages/startups/hero/contact-form/**'
permissions:
  contents: read

jobs:
  install:
    runs-on:
      group: neondatabase-protected-runner-group
      labels: linux-ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@4d991eb9b905ef189e4c376166672c3f2f230481 # v2.11.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Cypress run
        uses: cypress-io/github-action@fa4a118725a8f001170d49631ea89e5d66fee626 # v7.4.1
        with:
          browser: chrome
          build: npm run build
          start: npm run start
          wait-on: 'http://localhost:3000'
        env:
          NEXT_PUBLIC_DEFAULT_SITE_URL: http://localhost:3000
          NEXT_PUBLIC_GITHUB_PATH: ${{ secrets.NEXT_PUBLIC_GITHUB_PATH }}
