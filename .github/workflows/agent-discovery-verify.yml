name: Agent Discovery Verify

# Single flow that verifies every agent / discovery endpoint cataloged in
# config/agent-endpoints.yaml stays correct and in sync with the source of truth
# (src/constants/agent-discovery.js). Covers skills, MCP, API/OpenAPI, OAuth,
# the AI-Gateway model catalog (folded in from the old models-sync check), and
# llms.txt.
#
#   - Pull requests touching a discovery surface -> offline verification (fast,
#     no network): schema + source-of-truth consistency + committed artifacts.
#   - Daily schedule / manual dispatch -> --live: additionally fetches neon.com
#     and compares /models.json against models.dev. Opens/updates a tracking
#     issue on failure so drift can't rot silently.

on:
  pull_request:
    paths:
      - 'config/agent-endpoints.yaml'
      - 'src/constants/agent-discovery.js'
      - 'scripts/verify-agent-endpoints.mjs'
      - 'scripts/lib/api-coverage.mjs'
      - 'src/utils/api-ref.mjs'
      - 'content/docs/api-operation-ids.json'
      - 'src/app/.well-known/**'
      - 'src/app/models.json/**'
      - 'src/scripts/generate-skills-index.js'
      - 'src/scripts/check-models-sync.js'
      - 'next.config.js'
      - 'package.json'
      - 'package-lock.json'
  schedule:
    # Every day at 8:00 AM UTC (matches the old AI Gateway Models Sync cadence)
    - cron: '0 8 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  verify:
    name: 'Verify agent-discovery endpoints'
    runs-on:
      group: neondatabase-protected-runner-group
      labels: linux-ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@4d991eb9b905ef189e4c376166672c3f2f230481 # v2.11.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # PRs: offline verification only (deterministic, no network dependency).
      - name: Verify (offline)
        if: github.event_name == 'pull_request'
        run: node scripts/verify-agent-endpoints.mjs | tee verify-report.txt

      # Schedule / manual: full live verification incl. models.dev sync.
      - name: Verify (live)
        if: github.event_name != 'pull_request'
        run: node scripts/verify-agent-endpoints.mjs --live | tee verify-report.txt

      - name: Open or update drift issue
        if: failure() && github.event_name != 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title="Agent-discovery endpoint drift detected"
          body="$(cat verify-report.txt 2>/dev/null || echo 'The agent-discovery verification failed. See the workflow run for details.')"
          body="${body}"$'\n\n'"— Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          existing="$(gh issue list --state open --search "${title} in:title" --json number --jq '.[0].number' 2>/dev/null || echo '')"
          if [ -n "${existing}" ]; then
            gh issue comment "${existing}" --body "${body}"
          else
            gh issue create --title "${title}" --body "${body}"
          fi
