name: SDK Docs Drift

# Weekly watchdog: installs the LATEST published @neon/sdk and runs the docs
# drift check in --strict mode, so operation-set skew (api-ref vs SDK) and any
# broken reference against the newest SDK turn the run red. On drift it opens
# (or comments on) a tracking issue so a stale doc surface can never rot
# silently after a new @neon/sdk release.

on:
  schedule:
    # Every Monday at 9:15 AM UTC (just after the weekly unit-test run)
    - cron: '15 9 * * 1'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  drift:
    name: 'Check docs vs @neon/sdk@latest'
    runs-on:
      group: neondatabase-protected-runner-group
      labels: linux-ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@4d991eb9b905ef189e4c376166672c3f2f230481 # v2.11.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check docs against latest @neon/sdk (strict)
        run: |
          set -o pipefail
          npm install @neon/sdk@latest --no-save
          node scripts/check-sdk-docs.mjs --strict --ci | tee drift-report.txt

      - name: Open or update drift issue
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          title="Neon SDK docs drift detected"
          body="$(cat drift-report.txt 2>/dev/null || echo 'The SDK docs drift check failed. See the workflow run for details.')"
          body="${body}"$'\n\n'"— Run: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          existing="$(gh issue list --state open --search "${title} in:title" --json number --jq '.[0].number' 2>/dev/null || echo '')"
          if [ -n "${existing}" ]; then
            gh issue comment "${existing}" --body "${body}"
          else
            gh issue create --title "${title}" --body "${body}"
          fi
