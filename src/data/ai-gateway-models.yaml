# Neon AI Gateway — published model metadata
# Source of truth for docs, the filterable models page, and models.json.
# Generated/refreshed by the /update-ai-models command. Do not hand-edit
# generated fields (codeSamples) directly -- re-run the command instead.

anthropic:
  claude-haiku-4-5:
    displayName: Claude Haiku 4.5
    openWeights: false
    description: Anthropic's fastest and most cost-effective model, delivering near-frontier coding quality
      with exceptional speed and efficiency.
    recommendedFor:
    - Real-time, low-latency chat and customer service agents
    - Rapid prototyping and pair programming
    - Cost-conscious production deployments
    contextWindow: 200000
    maxOutputTokens: 64000
    modalities:
      input:
      - text
      - image
      output:
      - text
    capabilities:
    - tool_use
    - reasoning
    - prompt_caching
    reasoning:
      control: 'thinking.type: enabled, thinking.budget_tokens'
    pricing:
      input: 1.0
      output: 5.0
      cacheRead: 0.1
      cacheWrite: 1.25
      status: free_preview
    releaseDate: '2025-10-15'
    status: active
    dialects:
    - chat_completions
    - anthropic_messages
    codeSamples:
      aisdk: |
        // .env
        // NEON_AI_GATEWAY_BASE_URL=https://<your-branch-ai-gateway-endpoint>
        // NEON_AI_GATEWAY_TOKEN=<your token>

        import { generateText } from 'ai';
        import { neon } from '@neondatabase/ai-sdk-provider';

        const { text } = await generateText({
          model: neon('claude-haiku-4-5'),
          prompt: 'Explain Serverless Postgres.',
        });

        console.log(text);
      mastra: |
        // .env
        // NEON_AI_GATEWAY_BASE_URL=https://<your-branch-ai-gateway-endpoint>
        // NEON_AI_GATEWAY_TOKEN=<your token>

        import { Agent } from '@mastra/core/agent';

        const agent = new Agent({
          name: 'neon-demo',
          instructions: 'You are a helpful assistant.',
          model: 'neon/claude-haiku-4-5',
        });

        const { text } = await agent.generate('Explain Serverless Postgres.');
        console.log(text);
      python: |
        from openai import OpenAI
        import os

        client = OpenAI(
            api_key=os.environ["NEON_AI_GATEWAY_TOKEN"],
            base_url="https://<your-branch-ai-gateway-endpoint>/ai-gateway/mlflow/v1",
        )

        resp = client.chat.completions.create(
            model="claude-haiku-4-5",
            messages=[{"role": "user", "content": "Explain Serverless Postgres."}],
        )
        print(resp.choices[0].message.content)
      typescript: |
        import OpenAI from "openai";

        const client = new OpenAI({
          apiKey: process.env.NEON_AI_GATEWAY_TOKEN!,
          baseURL: "https://<your-branch-ai-gateway-endpoint>/ai-gateway/mlflow/v1",
        });

        const resp = await client.chat.completions.create({
          model: "claude-haiku-4-5",
          messages: [{ role: "user", content: "Explain Serverless Postgres." }],
        });
        console.log(resp.choices[0].message.content);
      curl: |
        curl https://<your-branch-ai-gateway-endpoint>/ai-gateway/mlflow/v1/chat/completions \
          -H "Authorization: Bearer $NEON_AI_GATEWAY_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "model": "claude-haiku-4-5",
            "messages": [{"role": "user", "content": "Explain Serverless Postgres."}]
          }'
    lastVerified: '2026-07-09'
