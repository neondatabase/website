<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 332" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="ah5" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="758" height="330" rx="14" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="24" y="34" font-size="15" font-weight="700" fill="#111827">Reciprocal rank fusion merges two ranked lists</text>

  <!-- semantic list -->
  <text x="40" y="64" font-size="12" font-weight="700" fill="#1e40af">Semantic ranks</text>
  <rect x="40" y="74" width="150" height="28" rx="6" fill="#eff6ff" stroke="#60a5fa"/>
  <text x="50" y="92" font-size="11" fill="#1e3a8a">1 · chunk B</text>
  <rect x="40" y="106" width="150" height="28" rx="6" fill="#eff6ff" stroke="#93c5fd"/>
  <text x="50" y="124" font-size="11" fill="#1e3a8a">2 · chunk A</text>
  <rect x="40" y="138" width="150" height="28" rx="6" fill="#eff6ff" stroke="#bfdbfe"/>
  <text x="50" y="156" font-size="11" fill="#1e3a8a">3 · chunk D</text>

  <!-- keyword list -->
  <text x="40" y="196" font-size="12" font-weight="700" fill="#92400e">Keyword ranks</text>
  <rect x="40" y="206" width="150" height="28" rx="6" fill="#fffbeb" stroke="#fbbf24"/>
  <text x="50" y="224" font-size="11" fill="#92400e">1 · chunk A</text>
  <rect x="40" y="238" width="150" height="28" rx="6" fill="#fffbeb" stroke="#fcd34d"/>
  <text x="50" y="256" font-size="11" fill="#92400e">2 · chunk C</text>
  <rect x="40" y="270" width="150" height="28" rx="6" fill="#fffbeb" stroke="#fde68a"/>
  <text x="50" y="288" font-size="11" fill="#92400e">3 · chunk B</text>

  <!-- formula -->
  <rect x="244" y="118" width="244" height="96" rx="10" fill="#f9fafb" stroke="#e5e7eb"/>
  <text x="366" y="142" font-size="12" font-weight="600" fill="#111827" text-anchor="middle">score(row) =</text>
  <text x="366" y="170" font-size="15" font-weight="700" fill="#111827" text-anchor="middle">Σ  1 / (k + rank)</text>
  <text x="366" y="196" font-size="11" fill="#6b7280" text-anchor="middle">summed across the lists it appears in, k = 60</text>

  <line x1="196" y1="120" x2="240" y2="150" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#ah5)"/>
  <line x1="196" y1="252" x2="240" y2="182" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#ah5)"/>
  <line x1="488" y1="166" x2="536" y2="166" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#ah5)"/>

  <!-- fused list -->
  <text x="542" y="64" font-size="12" font-weight="700" fill="#065f46">Fused order</text>
  <rect x="542" y="74" width="190" height="30" rx="6" fill="#ecfdf5" stroke="#10b981"/>
  <text x="554" y="93" font-size="11" font-weight="600" fill="#065f46">chunk A · in both lists, wins</text>
  <rect x="542" y="110" width="190" height="30" rx="6" fill="#ecfdf5" stroke="#34d399"/>
  <text x="554" y="129" font-size="11" fill="#047857">chunk B · top of one, high</text>
  <rect x="542" y="146" width="190" height="30" rx="6" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="554" y="165" font-size="11" fill="#047857">chunk C</text>
  <rect x="542" y="182" width="190" height="30" rx="6" fill="#ecfdf5" stroke="#a7f3d0"/>
  <text x="554" y="201" font-size="11" fill="#047857">chunk D</text>

  <text x="542" y="236" font-size="11" fill="#6b7280">A small k would let a single</text>
  <text x="542" y="252" font-size="11" fill="#6b7280">rank-1 hit dominate. k = 60</text>
  <text x="542" y="268" font-size="11" fill="#6b7280">flattens that, so agreement</text>
  <text x="542" y="284" font-size="11" fill="#6b7280">across retrievers wins.</text>
</svg>
