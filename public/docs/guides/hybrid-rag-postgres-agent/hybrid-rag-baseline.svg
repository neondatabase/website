<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 300" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <marker id="bl" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#9ca3af"/>
    </marker>
  </defs>
  <rect x="1" y="1" width="758" height="298" rx="14" fill="#ffffff" stroke="#e5e7eb"/>
  <text x="24" y="34" font-size="15" font-weight="700" fill="#111827">Vector-only retrieval: nearest neighbors by distance</text>

  <!-- query + embed -->
  <rect x="28" y="120" width="130" height="48" rx="10" fill="#eef2ff" stroke="#a5b4fc"/>
  <text x="93" y="142" font-size="12" font-weight="600" fill="#3730a3" text-anchor="middle">user query</text>
  <text x="93" y="158" font-size="10.5" fill="#4338ca" text-anchor="middle">text</text>

  <line x1="158" y1="144" x2="186" y2="144" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#bl)"/>
  <rect x="190" y="120" width="92" height="48" rx="10" fill="#eff6ff" stroke="#60a5fa"/>
  <text x="236" y="142" font-size="12" font-weight="600" fill="#1e40af" text-anchor="middle">embed</text>
  <text x="236" y="158" font-size="10.5" fill="#1e3a8a" text-anchor="middle">query vector</text>
  <line x1="282" y1="144" x2="310" y2="144" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#bl)"/>

  <!-- vector space -->
  <text x="320" y="62" font-size="11" font-weight="700" fill="#6b7280" letter-spacing="0.5">VECTOR SPACE</text>
  <rect x="320" y="72" width="232" height="200" rx="10" fill="#f9fafb" stroke="#e5e7eb"/>
  <!-- far gray dots -->
  <circle cx="362" cy="110" r="5" fill="#cbd5e1"/>
  <circle cx="520" cy="120" r="5" fill="#cbd5e1"/>
  <circle cx="500" cy="232" r="5" fill="#cbd5e1"/>
  <circle cx="360" cy="240" r="5" fill="#cbd5e1"/>
  <circle cx="345" cy="180" r="5" fill="#cbd5e1"/>
  <circle cx="525" cy="180" r="5" fill="#cbd5e1"/>
  <!-- distance rings -->
  <circle cx="436" cy="172" r="40" fill="none" stroke="#a7f3d0" stroke-width="1" stroke-dasharray="3 3"/>
  <circle cx="436" cy="172" r="64" fill="none" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3 3"/>
  <!-- query marker -->
  <circle cx="436" cy="172" r="6" fill="#6366f1"/>
  <text x="436" y="160" font-size="10" fill="#4338ca" text-anchor="middle">query</text>
  <!-- nearest green dots -->
  <circle cx="410" cy="150" r="6" fill="#10b981"/>
  <circle cx="466" cy="158" r="6" fill="#10b981"/>
  <circle cx="452" cy="206" r="6" fill="#10b981"/>

  <line x1="552" y1="160" x2="582" y2="160" stroke="#9ca3af" stroke-width="1.5" marker-end="url(#bl)"/>

  <!-- result list -->
  <text x="590" y="62" font-size="11" font-weight="700" fill="#6b7280" letter-spacing="0.5">TOP K</text>
  <rect x="590" y="120" width="146" height="28" rx="6" fill="#ecfdf5" stroke="#10b981"/>
  <text x="601" y="138" font-size="11" fill="#065f46">chunk A · 0.12</text>
  <rect x="590" y="154" width="146" height="28" rx="6" fill="#ecfdf5" stroke="#34d399"/>
  <text x="601" y="172" font-size="11" fill="#047857">chunk B · 0.19</text>
  <rect x="590" y="188" width="146" height="28" rx="6" fill="#ecfdf5" stroke="#6ee7b7"/>
  <text x="601" y="206" font-size="11" fill="#047857">chunk C · 0.24</text>

  <text x="28" y="290" font-size="11" fill="#6b7280">Great for paraphrase. Keep this query as the baseline your eval set measures hybrid search against.</text>
</svg>
